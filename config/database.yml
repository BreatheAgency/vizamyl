development: &default
  adapter: postgresql
  database: vizamyl_development
  encoding: utf8
  host: localhost
  password: 'password'
  min_messages: warning
  pool: 2
  timeout: 5000
  user: <%= ENV['USER'] %>

test:
  <<: *default
  database: vizamyl_test

staging:
  adapter: postgresql
  encoding: unicode
  pool: 5
  url: <%= ENV['DATABASE_URL'] %>
  sslmode: require  # Ensures SSL is used for Heroku

production:
  adapter: postgresql
  encoding: unicode
  pool: 5
  url: <%= ENV['DATABASE_URL'] %>
  sslmode: require  # Ensures SSL is used for Heroku
