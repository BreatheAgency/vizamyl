    terms-and-conditions:
      title: Terms and conditions
      body_html: |
        <p><b>1. Terms of Use</b></p>
        <p>The Vizamyl&#0153; E-Training website is where users can access training material relating to GE Healthcare's Vizamyl&#0153; product (the "Product") and eventually take an exam in order to assess whether the user has understood how to safely use the Product in accordance with the Product's summary of Product Characteristics. The website is hosted on behalf of GE Healthcare by <a target="_blank" href="http://www.sevenstones.co.uk">www.sevenstones.co.uk</a> of Olympic House, 317-321 Latimer Road, London, W10 6RA. The following terms and conditions apply to anyone who uses the website.</p>
        <p><b>2. Information GE Healthcare Collects and How We Use It</b></p>
        <p><b>a. Use of Personal Information</b></p>
        <p>For optimal use of the website and your training, GE Healthcare will need to collate information regarding names, position, progress through the course and whether the course has been completed.</p>
        <p>We may disclose information about you if</p>
        <p>i. Required to do so by law or legal process</p>
        <p>ii. To law enforcement or other government officials as required to comply with a legitimate legal request, or</p>
        <p>iii. When we believe disclosure is necessary to prevent physical harm or financial loss, or in connection with an investigation of suspected or actual illegal activity</p>
        <p>iv. We reserve the right to transfer any information we have about you in the event that we sell or transfer all or a portion of our business assets (including through bankruptcy).</p>
        <p>We do not sell or otherwise disclose personal information about users of the website outside of the GE group and its affiliates except as described in this document and in the Contact Permission document.</p>
        <p><b>b. Privacy and storage</b></p>
        <p>This data will be stored on a server based in the Republic of Ireland. The data will only be used for administrative purposes unless you have consented to other uses such as your data being used for marketing purposes. You can update your contact preferences at any time in the "My account" section. Data will only be accessed by GE Healthcare employees, unless in case of breakdown of the system or website where administrators based at <a target="_blank" href="http://www.sevenstones.co.uk">www.sevenstones.co.uk</a> may be able to access data for administrative or maintenance purposes. Furthermore, our server platform at <a target="_blank" href="http://www.heroku.com">www.heroku.com</a> is hosted and managed by Amazon Web Services (<a target="_blank" href="http://aws.amazon.com/">http://aws.amazon.com/</a>) and therefore Amazon employees may have access to the data if there is a legitimate business need for such privileges. This privilege terminates at the moment this need ceases. If the problem lies in the starting up or running of an application or software, providing solutions to known problems, answering general questions then the issue will be resolved by administrators based at <a target="_blank" href="http://www.heroku.com">www.heroku.com</a>.</p>
        <p>Your data will be stored for a reasonable period of time. This is in order to assess whether the Product should be supplied to you for clinical use based on whether you have passed the test relating to the safe usage of the Product in accordance with the Product's Summary of Product Characteristics (the "Exam"). Should you have failed the Exam, we will need to use your data for administrative purposes in order to arrange face-to-face training in your country. Therefore, your data will only be used for administrative and training purposes. If you feel as though your data has been used inappropriately, contact us at <a href="mailto:contactus@ge.com">contactus@ge.com</a>.</p>
        <p><b>c. Transfer</b></p>
        <p>Your information supplied to GE Healthcare will be used in the United Kingdom apart from information stored on servers in the Republic of Ireland. Your information will only be accessed by internal staff of GE Healthcare unless in case of breakdown or necessary legal process as described above. Your information will not leave the European Union.</p>
        <p><b>3. Protection of Personal Information</b></p>
        <p>At GE Healthcare, our goal is to protect your personal information submitted to us through our sites. We and our data processors maintain administrative, technical and physical safeguards to protect against unauthorized disclosure, use, alteration or destruction of the personal information that you provide on this and other GE websites. We also employ reasonable technologies to keep the personal information you provide on the site secure.</p>
        <p><b>4. Proprietary Rights</b></p>
        <p><b>a. Intellectual Property Rights</b></p>
        <p>GE Healthcare, its affiliates and licensors own and retain all rights in the website, which may include confidential information such as that outlined in clause 2a. All content on the website and all GE Healthcare trademarks and logos are owned by or licensed to GE Healthcare. Nothing in these Terms and Conditions shall be interpreted as transferring by implication or otherwise any licence or right in relation to such rights to any third party except as expressly provided.</p>
        <p>"GE Healthcare" and the GE logo are trademarks registered in the United Kingdom under number 2347097, in the European Community under numbers 003173151 and 003485745, in USA under numbers 2961099 and 3142821, and in other countries. GE and the GE Monogram are trademarks of General Electric Company.</p>
        <p><b>b. Copyrights</b></p>
        <p>All content on the website, including but not limited to design, text, software, technical drawings, configurations, graphics, other files, and their selection and arrangement ("<b>Content</b>"), are either Copyright &#0169;2015 General Electric Company, or are the proprietary property of GE Healthcare, its affiliates or licensors. All rights reserved.</p>
        <p>You may not republish any content on the website any Internet, Intranet or Extranet site or to incorporate the information in any other database or compilation without prior written permission. Any use other than for clinical purposes of the Content is strictly prohibited. You further agree that you will not systematically extract, collect or harvest, through electronic means or otherwise, any data from this website.</p>
        <p><b>c. Patents</b></p>
        <p>GE Healthcare's products and processes may be covered by one or more patents and are subject to other trade secret and proprietary rights. GE Healthcare reserves all such rights. No transfer or grant of rights under any patents is made or is to be implied by any provision of this Terms and Conditions or by anything displayed on the website.</p>
        <p><b>d. Trademarks</b></p>
        <p>All trademarks on the website are either trademarks or registered trademarks of General Electric Company or GE Healthcare, its affiliates or licensors and may not be copied, imitated, or used, in whole or in part, without the prior written permission of GE Healthcare. All page headers, custom graphics, button icons, and scripts are service marks, trademarks and/or trade dress of General Electric Company, GE Healthcare or its affiliates, and may not be copied, imitated, or used, in whole or in part, without the prior written permission of GE Healthcare.</p>
        <p><b>5. Use of Cookies and Similar Technologies</b></p>
        <p>The website will store cookies. For a signed in user: a single cookie will only be stored while the user has the site open. It will be deleted when the user leaves the page or closes their browser. In order to monitor usage of the site: Google Analytics will be used for this function. Google Analytics mainly uses first-party cookies to report on visitor interactions on the website. These cookies are used to store non-personally identifiable information. Browsers do not share first-party cookies across domains. Unless you disable such technologies, by using our Forum and online services, you agree that we can place these types of cookies and related technologies on your device.</p>
        <p><b>6. Software</b></p>
        <p>Any software, including any files, images, code, and data accompanying the software (collectively, "<b>Software</b>"), used or accessible through this website may be used solely by you, provided that such uses are not competitive with or derogatory to GE Healthcare. GE Healthcare retains full and complete title to and all intellectual property rights in the Software. You agree not to copy, transfer, distribute, sell, modify, decompile, reverse engineer, disassemble or create derivative works from any Software.</p>
        <p><b>7. User Conduct</b></p>
        <p>By using this website you agree</p>
        <p>i. not to disrupt or interfere with the security of, or otherwise abuse, the website, or any services, system resources, accounts, servers or networks connected to or accessible through the website;</p>
        <p>ii. not to interfere with another user's training session or use of the website;</p>
        <p>iii. not to share information about the training course and share answers with those who have not yet completed and passed the course;</p>
        <p>iv. not to upload, post, or otherwise transmit through this website any viruses or other harmful, disruptive or destructive files.</p>
        <p><b>8. Jurisdiction, Applicable Law and Dispute Notice</b></p>
        <p>These Terms are governed by and construed in accordance with the laws of England and Wales and you submit to the non-exclusive jurisdiction of the English courts in respect of any disputes which may arise in relation to your use of the website.</p>
        <p><b>9. Limitation of Liability</b></p>
        <p>UNDER NO CIRCUMSTANCES, INCLUDING, WITHOUT LIMITATION, NEGLIGENCE, SHALL GE OR ITS PARENTS, SUBSIDIARIES, AFFILIATES, OFFICERS, DIRECTORS, EMPLOYEES, AGENTS, OR SUPPLIERS BE LIABLE FOR ANY DIRECT, INDIRECT, INCIDENTAL, SPECIAL OR CONSEQUENTIAL DAMAGES ARISING FROM OR IN CONNECTION WITH THE USE OF OR THE INABILITY TO USE THIS SITE OR ANY CONTENT CONTAINED ON THE SITE, OR RESULTING FROM UNAUTHORIZED ACCESS TO OR ALTERATION OF YOUR TRANSMISSIONS OR DATA, OR OTHER INFORMATION THAT IS SENT OR RECEIVED OR NOT SENT OR RECEIVED, INCLUDING BUT NOT LIMITED TO, DAMAGES FOR LOSS OF PROFITS, USE, DATA OR OTHER INTANGIBLES, EVEN IF GE HAS BEEN ADVISED OF THE POSSIBILITY OF SUCH DAMAGES.</p>
        <p>THE PARTIES ACKNOWLEDGE THAT THIS IS A REASONABLE ALLOCATION OF RISK. SOME JURISDICTIONS DO NOT ALLOW THE LIMITATION OR EXCLUSION OF LIABILITY FOR INCIDENTAL OR CONSEQUENTIAL DAMAGES, SO SOME OF THE ABOVE MAY NOT APPLY TO YOU.</p>
        <p><b>10. Waiver</b></p>
        <p>The failure of GE Healthcare to enforce any provision of these Terms of Use shall not be deemed a waiver of such provision nor the right to enforce such provision. Furthermore, any waiver of any provision of these Terms by any party will be effective only if in writing and signed by a party</p>
        <p><b>11. Notices and Contact</b></p>
        <p>GE Healthcare's address for notices relating to this website is as follows:</p>
        <p>
          GE Healthcare<br>
          White Lion Road,<br>
          Amersham,<br>
          Buckinghamshire,<br>
          HP7 9LL<br>
        </p>
        <p>If you have any queries about these Terms, please contact us at <a href="mailto:contactus@ge.com">contactus@ge.com</a></p>
        <p><b>12. Changes to this Privacy Policy</b></p>
        <p>These Terms and Conditions may be updated by GE Healthcare periodically and without prior notice to you to reflect changes in our online information practices. Updates to this policy will be posted to the website. We also encourage users to periodically check this document to understand how GE Healthcare protects and uses your information.</p>
