      body_html: |
        <p><b>1. Nutzungsbedingungen</b></p>
        <p>Die Vizamyl&#0153; E-Training Website ermöglicht den Zugang zu Schulungsmaterialien zum GE Healthcare-Produkt Vizamyl&#0153; (nachfolgend „Produkt“). Die Schulung beinhaltet eine Prüfung, mit der ermittelt wird, ob der Teilnehmer ausreichende Kenntnisse zur sicheren Anwendung des Produkts gemäß der Fachinformation zum Produkt erlangt hat. Die Administration der Website erfolgt im Auftrag von GE Healthcare durch <a target="_blank" href="http://www.sevenstones.co.uk">www.sevenstones.co.uk</a> of Olympic House, 317-321 Latimer Road, London, W10 6RA. Die folgenden Teilnahme- und Nutzungsbedingungen gelten für alle Nutzer der Website.</p>
        <p><b>2. Erhebung und Nutzung von Daten durch GE Healthcare</b></p>
        <p><b>a. Nutzung persönlicher Daten</b></p>
        <p>Zur optimalen Nutzung der Website und der Schulungsinhalte muss GE Healthcare Daten wie Namen, Funktionen/Positionen von Teilnehmern, Lernfortschritte und Abschluss des Kurses erheben.</p>
        <p>Wir geben Ihre persönlichen Daten weiter,</p>
        <p>i. falls dies laut gesetzlicher Bestimmungen oder gerichtlicher Anordnungen erforderlich ist.</p>
        <p>ii. Die Weitergabe erfolgt an Exekutiv- oder Regierungsbehörden zur Erfüllung rechtlicher Anforderungen oder</p>
        <p>iii. in Fällen, in denen die Weitergabe nach unserem Ermessen erforderlich ist, um physische Schäden oder finanzielle Verluste zu vermeiden oder die Untersuchung mutmaßlicher oder tatsächlicher illegaler Aktivitäten zu ermöglichen.</p>
        <p>iv. Wir behalten uns die Weitergabe Ihrer persönlichen Daten für den Fall des Verkaufs / der Eigentumsübertragung unserer Unternehmens- und Vermögenswerte vor (einschließlich durch Insolvenz).</p>
        <p>Die Veräußerung oder Weitergabe von persönlichen Daten der Nutzer der Website an Parteien außerhalb der GE-Gruppe erfolgt ausschließlich zu den in diesem Dokument sowie in der Einverständniserklärung mit der Kontaktaufnahme dargelegten Bedingungen.</p>
        <p><b>b. Datenschutz und Datenspeicherung</b></p>
        <p>Die Datenspeicherung erfolgt auf einem Server mit Standort in der Republik Irland. Die Daten werden ausschließlich zu administrativen Zwecken verwendet, sofern Sie nicht ausdrücklich Ihr Einverständnis mit der Nutzung zu anderen Zwecken wie beispielsweise Marketing erklärt haben. Sie können Ihre Kontakt- und Kommunikationspräferenzen jederzeit im Bereich „Mein Konto“ ändern. Zu den Daten haben ausschließlich Mitarbeiter von GE Healthcare Zugang. Dies gilt nicht in Fällen eines technischen Defekts oder Ausfalls des Systems oder der Website. In solchen Fällen können Administratoren von <a target="_blank" href="http://www.sevenstones.co.uk">www.sevenstones.co.uk</a> zu administrativen Zwecken oder für Wartungs- und Reparaturarbeiten Zugang zu den Daten erhalten. Unsere Serverplattform auf <a target="_blank" href="http://www.heroku.com">www.heroku.com</a> wird von Amazon Web Services (<a target="_blank" href="http://aws.amazon.com/">http://aws.amazon.com/</a>) bereitgestellt und verwaltet. In sachlich begründeten Fällen kann Mitarbeitern von Amazon der Zugang zu den Daten gewährt werden. Ein solches Recht auf Datenzugang erlischt, sobald die Begründung für den Zugang entfällt. Die Lösung von Problemen im Zusammenhang mit dem Start oder Betrieb von Anwendungen oder Software, die Bereitstellung von Lösungen für bekannte Probleme und die Beantwortung allgemeiner Fragen liegen im Zuständigkeitsbereich von Administratoren bei <a target="_blank" href="http://www.heroku.com">www.heroku.com</a>.</p>
        <p>Ihre Daten werden für einen angemessenen Zeitraum gespeichert. Diese Speicherung ist erforderlich, um zu ermitteln, ob das Produkt zur klinischen Verwendung an Sie geliefert werden soll, nachdem Sie eine Prüfung zur sicheren Verwendung des Produkts gemäß der Fachinformation zum Produkt bestanden haben (nachfolgend als „Prüfung“ bezeichnet). Falls Sie die Prüfung nicht bestehen, benötigen wir Ihre Daten für administrative Zwecke im Zusammenhang mit der Bereitstellung weiterer Präsenzschulungen in Ihrem Land. Ihre Daten werden demnach sowohl für administrative als auch für schulungsbezogene Zwecke verwendet. Bitte nehmen Sie unter <a href="mailto:contactus@ge.com">contactus@ge.com</a>. Kontakt mit uns auf, wenn Sie der Meinung sind, dass Ihre Daten in unzulässiger Weise verwendet wurden.</p>
        <p><b>c. Transfer</b></p>
        <p>Die von Ihnen an GE Healthcare übermittelten Daten werden in Großbritannien sowie auf Servern in der Republik Irland verwendet. Mit Ausnahme der oben beschriebenen Fälle von Systemausfällen oder rechtlich erforderlichen Maßnahmen erhalten ausschließlich interne Mitarbeiter von GE Healthcare Zugang zu Ihren Daten. Ihre Daten werden nicht in Gebiete außerhalb der Europäischen Union übermittelt.</p>
        <p><b>3. Schutz persönlicher Daten</b></p>
        <p>Der Schutz der von Ihnen über unsere Websites übermittelten Daten hat für GE Healthcare höchste Priorität. Wir selbst und die für uns im Bereich Datenverarbeitung tätigen Parteien setzen administrative, technische und physische Mittel ein, mit denen die von Ihnen über diese oder andere GE-Websites übermittelten Daten vor unautorisierter Weitergabe, Änderung oder Zerstörung geschützt werden. Darüber hinaus greifen wir auf geeignete Technologien zur Sicherung Ihrer persönlichen Daten zurück.</p>
        <p><b>4. Eigentumsrechte</b></p>
        <p><b>a. Geistiges Eigentum </b></p>
        <p>GE Healthcare, seine Tochterunternehmen und seine Lizenzgeber halten sämtliche Rechte an der Website, darunter auch die in Klausel 2a genannten vertraulichen Informationen. Alle Inhalte der Website sowie alle GE Healthcare-Marken und -Logos sind Eigentum von oder lizenziert an GE Healthcare. Keine Bestimmung dieser Teilnahme- und Nutzungsbedingungen ist als implizite oder anderweitige Übertragung von Rechten oder Lizenzen an Drittparteien auslegbar, sofern dies nicht ausdrücklich angegeben wird.</p>
        <p>„GE Healthcare“ und das GE-Logo sind als Handelsmarken eingetragen. Der Eintrag besteht in Großbritannien unter der Nr. 2347097, in der Europäischen Union unter den Nummern 003173151 und 003485745 sowie in den USA unter den Nummern 2961099 und 3142821. Darüber hinaus bestehen Einträge in weiteren Ländern. GE und GE Monogram sind Handelsmarken der General Electric Company.</p>
        <p><b>b. Copyright</b></p>
        <p>Alle Inhalte der Website, darunter Gestaltungsentwürfe, Texte, Software, technische Zeichnungen, Konfigurationen, Grafiken und andere Dateien sowie deren Auswahl und Zusammenstellung (zusammenfassend als „<b>Inhalte</b>“ bezeichnet) sind entweder Copyright &#0169; 2015 General Electric Company oder Eigentum von GE Healthcare, seinen Tochterunternehmen oder seinen Lizenzgebern. Alle Rechte vorbehalten.</p>
        <p>Ohne vorherige schriftliche Genehmigung dürfen Inhalte der Website nicht in Internet-, Intranet- oder Extranet-Seiten veröffentlicht oder in andere Datenbanken oder Kompilationen eingefügt werden. Eine Verwendung der Inhalte zu nicht klinischen Zwecken ist streng verboten. Sie verpflichten sich, jede Form systematischer Extraktion oder Sammlung von Daten dieser Website auf elektronischem oder anderem Weg zu unterlassen.</p>
        <p><b>c. Patente</b></p>
        <p>Produkte und Verfahren von GE Healthcare können durch Patente geschützt und Gegenstand von Geschäftsgeheimnissen und anderen Eigentumsrechten sein. GE Healthcare behält sich solche Rechte in vollem Umfang vor. Keine Bestimmung dieser Teilnahme- und Nutzungsbedingungen und kein Bestandteil der Website begründet eine Übertragung oder Gewährung von durch Patent geschützten Rechten.</p>
        <p><b>d. Marken</b></p>
        <p>Alle Marken auf der Website sind Marken oder eingetragene Marken im Eigentum von General Electric Company, GE Healthcare, seinen Tochterunternehmen oder Lizenzgebern. Diese Marken oder einzelne ihrer Elemente/Bestandteile dürfen ohne vorherige schriftliche Genehmigung von GE Healthcare nicht kopiert, imitiert oder anderweitig verwendet werden. Alle Seiten-Header, individuell gestalteten Grafiken, Schaltflächensymbole und Skripte sind Dienstleistungsmarken, Handelsmarken und/oder Handelsformen im Eigentum von General Electric Company, GE Healthcare oder seinen Tochterunternehmen und dürfen ohne vorherige schriftliche Genehmigung von GE Healthcare nicht kopiert, imitiert oder anderweitig verwendet werden.</p>
        <p><b>5. Verwendung von Cookies und vergleichbaren Technologien</b></p>
        <p>Die Website speichert Cookies. Bei angemeldeten Nutzern: Während die Seite geöffnet ist, wird ein einzelnes Cookie gespeichert. Dieses Cookie wird gelöscht, sobald der Nutzer die Seite verlässt oder den Browser schließt. Beobachtung der Seitennutzung: Für diese Funktion wird Google Analytics verwendet. Google Analytics verwendet hauptsächlich First-Party-Cookies (Cookies des Seitenanbieters), um die Besucherinteraktion auf der Website zu erfassen. Diese Cookies dienen zur Speicherung nicht personenbezogener Informationen. First-Party-Cookies werden von Webbrowsern nicht über Domains hinweg übermittelt. Sofern Sie solche Technologien nicht über unser Forum oder unsere Online-Services deaktivieren, erklären Sie sich mit der Speicherung von Cookies und der Nutzung verwandter Technologien auf Ihrem Gerät einverstanden.</p>
        <p><b>6. Software</b></p>
        <p>Alle über diese Website nutzbaren oder zugänglichen Softwarekomponenten, insbesondere Dateien, Bildern, Code und Daten (zusammenfassend als „<b>Software</b>“ bezeichnet) werden Ihnen nur zur persönlichen Nutzung durch Sie selbst zur Verfügung gestellt. Die Nutzung darf nur erfolgen, soweit Sie damit nicht in wirtschaftlichen Wettbewerb zu GE Healthcare treten oder die Nutzung keine Rufschädigung für GE Healthcare darstellt. Das Eigentumsrecht an der Software und alle dazugehörigen gewerblichen Schutzrechte verbleiben in vollem Umfang bei GE Healthcare. Sie erklären Ihr Einverständnis mit dem Verbot der Kopie, Übertragung, Weitergabe, Veräußerung, Modifikation, Dekompilierung, Rückentwicklung und Zerlegung der Software und verpflichten sich, keine aus der Software abgeleiteten Produkte zu erstellen.</p>
        <p><b>7. Nutzerverhalten</b></p>
        <p>Durch die Nutzung der Website verpflichten Sie sich,</p>
        <p>i. keine Eingriffe in die Sicherheitssysteme vorzunehmen oder in anderer Weise die Website, Dienstleistungen, Systemressourcen, Konten, Server oder Netzwerke zu missbrauchen, die mit der Website verbunden oder über die Website zugänglich sind</p>
        <p>ii. andere Nutzer nicht an der Nutzung der Schulungsmaterialien oder der Website zu hindern</p>
        <p>iii. keine Informationen über den Schulungskurs oder Antworten auf Prüfungsfragen an Personen weiterzugeben, die den Kurs noch nicht abgeschlossen und bestanden haben</p>
        <p>iv. über die Website keine Viren oder anderen schädliche Dateien hochzuladen, zu posten oder auf andere Weise zu verbreiten</p>
        <p><b>8. Zuständigkeit, anwendbares Recht und Streitverkündung </b></p>
        <p>Die vorliegenden Teilnahme- und Nutzungsbedingungen unterliegen dem Recht von England und Wales. Sie erklären Ihr Einverständnis mit der nicht ausschließlichen Zuständigkeit englischer Gerichte für alle Streitfälle, die im Zusammenhang mit Ihrer Nutzung der Website entstehen.</p>
        <p><b>9. Haftungsbegrenzung</b></p>
        <p>AUSSER IN FÄLLEN VON GROBER FAHRLÄSSIGKEIT UND VORSATZ SOWIE DER VERLETZUNG VON LEBEN, KÖRPER ODER GESUNDHEIT SIND GE ODER SEINE MUTTER- UND TOCHTERUNTERNEHMEN, ANGESCHLOSSENEN UNTERNEHMEN, MITARBEITER, VERTRETER ODER ZULIEFERER NICHT HAFTBAR FÜR DIREKTE SCHÄDEN, NEBENSCHÄDEN, ZUFÄLLIGE SCHÄDEN, SPEZIELLE SCHÄDEN ODER FOLGESCHÄDEN, DIE IM ZUSAMMENHANG MIT DER NUTZUNG DER WEBSITE ODER DER UNMÖGLICHKEIT DER NUTZUNG DER WEBSITE EINSCHLIESSLICH ALLER IHRER INHALTE ODER IM ZUSAMMENHANG MIT DEM UNBEFUGTEN ZUGRIFF AUF ODER DER UNBEFUGTEN ÄNDERUNG VON ÜBERTRAGENEN DATEN ODER ANDERER VON IHNEN GESENDETER ODER EMPFANGENER ODER NICHT GESENDETER ODER EMPFANGENER INFORMATION ENTSTEHEN. DIE HAFTUNGSFREISTELLUNG GILT AUCH FÜR DEN FALL VON FAHRLÄSSIGKEIT SOWIE FÜR SCHÄDEN IM ZUSAMMENHANG MIT ENTGANGENEM GEWINN, DATENVERLUST UND ANDEREN IMMATERIELLEN WERTEN ODER RECHTEN SOWIE FÜR DEN FALL, DASS GE DIE MÖGLICHKEIT DES SCHADENSEINTRITTS VORAB BEKANNT WAR.</p>
        <p>DIE VERTRAGSPARTEIEN STIMMEN ÜBEREIN, DASS DIES EINE ANGEMESSENE RISIKOALLOKATION DARSTELLT. IN EINIGEN STAATEN IST DER AUSSCHLUSS VON NEBEN- ODER FOLGESCHÄDEN NICHT GESTATTET. AUS DIESEM GRUND TREFFEN EINIGE DER OBEN DARGELEGTEN BESTIMMUNGEN AUF SIE U.U. NICHT ZU.</p>
        <p><b>10. Verzichtserklärung</b></p>
        <p>Die Nichtdurchsetzbarkeit von Bestimmungen dieser Teilnahme- und Nutzungsbedingungen seitens GE Healthcare bedeutet keine Außerkraftsetzung dieser Bestimmungen und begründet keinen generellen Verzicht auf die Durchsetzung solcher Bestimmungen. Jeglicher Verzicht auf Bestimmungen dieser Teilnahme- und Nutzungsbedingungen ist nur in schriftlicher Form gültig und muss von der den Verzicht aussprechenden Vertragspartei unterzeichnet sein.</p>
        <p><b>11. Kontaktdaten</b></p>
        <p>Hinweise, Anfragen und Kommentare zu dieser Website sind an folgende Adresse von GE Healthcare zu richten:</p>
        <p>
          GE Healthcare<br>
          White Lion Road,<br>
          Amersham,<br>
          Buckinghamshire,<br>
          HP7 9LL<br>
        </p>
        <p>Bitte wenden Sie sich bei Fragen zu den Teilnahme- und Nutzungsbedingungen an <a href="mailto:contactus@ge.com">contactus@ge.com</a></p>
        <p><b>12. Änderungen dieser Teilnahme- und Nutzungsbedingungen</b></p>
        <p>Die vorliegenden Teilnahme- und Nutzungsbedingungen können von GE Healthcare jederzeit und ohne vorherige Ankündigung aktualisiert und geändert werden. Aktualisierungen der Teilnahme- und Nutzungsbedingungen werden auf der Website veröffentlicht. Wir empfehlen den Nutzern, dieses Dokument regelmäßig zu lesen, um sich aktuelle Informationen über die von GE Healthcare praktizierte Datenverwendung und Datensicherung zu verschaffen.</p>
