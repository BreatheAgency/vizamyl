      body_html: |
        <p><b>1. 1. Termini di utilizzo</b></p>
        <p>Il sito Web formazione online Vizamyl&#0153; si trova dove gli utenti possono accedere alla documentazione per la formazione relativa al prodotto Vizamyl&#0153; (il "Prodotto") ed eventualmente superare un esame al fine di valutare se l’utente abbia compreso o meno come utilizzare in modo sicuro il Prodotto conformemente al Riepilogo delle caratteristiche del prodotto. La soluzione hosting del sito web per conto di GE Healthcare viene fornita <a target="_blank" href="http://www.sevenstones.co.uk">www.sevenstones.co.uk</a> da Olympic House, 317-321 Latimer Road, London, W10 6RA. I termini e le condizioni seguenti si applicano a chiunque utilizzi il sito Web.</p>
        <p><b>2. Le informazioni raccolte da GE Healthcare e come vengono utilizzate</b></p>
        <p><b>a. Utilizzo di informazioni personali</b></p>
        <p>Per l’utilizzo ottimale del sito Web e la sua formazione, GE Healthcare avrà necessità di raccogliere informazioni riguardo a nomi, posizione, avanzamento nel corso e se il corso è stato completato.</p>
        <p>Possiamo rivelare informazioni su di Lei se</p>
        <p>i. Richiesto dalla legge o per procedure legali</p>
        <p>ii. A funzionari di polizia o altri funzionari governativi se richiesto per adempiere a una legittima richiesta legale, o</p>
        <p>iii. Se crediamo che la rivelazione sia necessaria per prevenire un danno fisico che o perdite finanziarie, oppure in collegamento ad indagini su sospettata o comprovata attività illegale</p>
        <p>iv. Ci riserviamo il diritto di trasferire qualsiasi informazione su di Lei in nostro possesso nel caso di vendita o trasferimento di tutta o parte della nostra attività professionale (fallimento compreso).</p>
        <p>Non vendiamo o riveliamo altrimenti informazioni personali sugli utenti del sito Web al di fuori del gruppo GE e delle sue consociate tranne come descritto in questo documento e nel documento di autorizzazione del contatto.</p>
        <p><b>b. Riservatezza e conservazione</b></p>
        <p>Questi dati saranno conservati su un server che si trova in Irlanda. I dati saranno utilizzati esclusivamente per fini amministrativi a meno che Lei non abbia acconsentito ad altri usi come l’utilizzazione dei suoi dati a fini commerciali. È possibile aggiornare le proprie preferenze di contatto in qualsiasi momento nella sezione “Il mio account”. Solo i dipendenti di GE Healthcare possono accedere ai dati, a meno che non si verifichi un’interruzione del sistema o del sito Web, caso in cui gli amministratori che si trovano in <a target="_blank" href="http://www.sevenstones.co.uk">www.sevenstones.co.uk</a> may be able to avranno l’accesso ai dati a fini amministrativi e di manutenzione. Inoltre, la nostra piattaforma server presso <a target="_blank" href="http://www.heroku.com">www.heroku.com</a> si avvale di una soluzione di hosting ed è gestita da Amazon Web Services (<a target="_blank" href="http://aws.amazon.com/">http://aws.amazon.com/</a>) http://aws.amazon.com/), perciò i dipendenti di Amazon possono avere accesso ai dati se esiste un’effettiva esigenza aziendale per tale privilegio. Tale privilegio di accesso ha termine nel momento in cui questa esigenza cessa. Se il problema consiste nell’avvio o nell’esecuzione di un’applicazione o di un software, nella fornitura di soluzioni a problemi noti, nel rispondere a domande generali, in tal caso la questione sarà risolta dagli amministratori che si trovano presso <a target="_blank" href="http://www.heroku.com">www.heroku.com</a>.</p>
        <p>I suoi dati saranno conservati per un periodo di tempo ragionevole. Ciò allo scopo di poter valutare se il Prodotto debba essere fornito per un uso clinico in base al fatto che Lei abbia superato la prova relativa ad un uso sicuro del Prodotto conformemente al Riepilogo delle caratteristiche del Prodotto (“l’Esame”). Nel caso che Lei non abbia superato l’esame, avremo bisogno di utilizzare i suoi dati a fini amministrativi per organizzare una formazione presenziale nel suo paese. Perciò, i suoi dati saranno utilizzati ai soli fini amministrativi o di formazione. Nel caso si abbia la sensazione che si sia verificato un uso inappropriato dei dati, ci contatti allo <a href="mailto:contactus@ge.com">contactus@ge.com</a>.</p>
        <p><b>c. Trasferimento</b></p>
        <p>Le sue informazioni fornite a Ge Healthcare saranno utilizzate nel Regno Unito a parte le informazioni conservate sui server in Irlanda. Solo lo staff interno di GE Healthcare può accedere alle sue informazioni a meno che non si verifichi un’interruzione tecnica o una procedura legale sia necessaria come descritto in precedenza. Le sue informazioni non usciranno dall’Unione europea.</p>
        <p><b>3. Protezione delle informazioni personali</b></p>
        <p>In GE Healthcare, il nostro obiettivo è di proteggere le informazioni personali che ci ha inviato attraverso i nostri siti. Noi e i nostri incaricati al trattamento dati adottiamo disposizioni di sicurezza amministrativa, tecnica e fisica per proteggerli da divulgazione, uso, alterazione o distruzione non autorizzate di informazioni personali che ci siano state fornite su questo o su altri siti di GE. Utilizziamo inoltre tecnologie atte a mantenere le informazioni personali che ci sono state fornite su un sito sicuro.</p>
        <p><b>4. Diritti di proprietà</b></p>
        <p><b>a. Diritti di proprietà intellettuale</b></p>
        <p>GE Healthcare, le sue consociate e licenziatari detengono e mantengono tutti i diritti sul sito Web, che possano includere informazioni riservate come evidenziato alla clausola 2a. Tutti i contenuti del sito Web, i marchi depositati GE Healthcare e i loghi appartengono o sono concessi in licenza a GE Healthcare. Nulla in questi termini e condizioni dovranno essere interpretati come trasferimento per implicazione o altrimenti di qualsiasi licenza o diritto correlati a tali diritti a terzi salvo indicazioni contrarie.</p>
        <p>"GE Healthcare" e il logo GE sono marchi depositati nel Regno Unito con il numero 2347097, e nella Comunità europea con i numeri 003173151 e 003485745, negli USA con in numeri 2961099 e 3142821, e in altri paesi. GE e il monogramma GE sono marchi depositati della società General Electric.</p>
        <p><b>b. Diritti d’autore</b></p>
        <p>Tutti i contenuti del sito Web, compresi ma non limitatamente a design, testo, software, bozzetti tecnici, configurazioni, grafici, altri file e la loro selezione e disposizione ("<b>Contenuto</b>"), sono sia Copyright &#0169;2015 della società General Electric, o sono di proprietà di GE Healthcare, le sue consociate o licenziatari. Tutti i diritti riservati.</p>
        <p>Non è possibile ripubblicare contenuti del sito Web su qualsiasi sito Internet, Intranet o Extranet o integrare l’informazione in una base dati o compilazione senza previa autorizzazione scritta. Qualsiasi uso del contenuto diverso da fini clinici è severamente proibito. Si accetta inoltre di non estrarre, collezionare raccogliere in modo sistematico sia attraverso mezzi elettronici sia altrimenti, qualsiasi dato a partire da questo sito Web.</p>
        <p><b>c. Brevetti</b></p>
        <p>I prodotti e le procedure di GE Healthcare possono essere coperti da uno o più brevetti e essere soggetti ad altri segreti commerciali e diritti proprietari. GE Healthcare si riserva tutti questi diritti. Nessun trasferimento o donazione di diritti su possibili brevetti si effettua o si considera implicito o implicita per una qualsiasi disposizione dei presenti Termini e condizioni o per qualsiasi altra cosa affissa sul sito Web.</p>
        <p><b>d. Marchi depositati</b></p>
        <p>Tutti i marchi presenti sul sito Web sono marchi o marchi depositati della società General Electric o di GE Healthcare, le sue consociate o licenziatari e non possono essere copiati, imitati o utilizzati, integralmente o in parte, senza previa autorizzazione scritta di GE Healthcare. Tutte le intestazioni delle pagine, i grafici personalizzati, le icone pulsanti e script sono marche di servizio, marchi depositati o immagini commerciali della società General Electric, GE Healthcare o sue affiliate e non possono essere copiati, imitati o usati, integralmente o in parte, senza previa autorizzazione scritta di GE Healthcare.</p>
        <p><b>5. Uso di Cookie e tecnologie similari</b></p>
        <p>Il sito Web memorizza i cookie. Per un utente registrato: un unico cookie verrà conservato solo mentre l’utente abbia il sito aperto. Sarà cancellato una volta che l’utente lascia la pagina o chiude il suo browser. Per monitorare l’uso del sito: Per questa funzione sarà utilizzato Google Analytics. Google Analytics usa principalmente i cookie proprietari per segnalare le interazioni dei visitatori sul sito. Questi cookie son utilizzati per memorizzare informazioni identificabili ma non personali. I browser non condividono i cookie proprietari attraverso i domini. A meno che non si disattivino tali tecnologie, per l’utilizzo del nostro Forum e dei nostri servizi online, si accetta che possiamo collocare questo tipo di cookie e relative tecnologie sul suo dispositivo</p>
        <p><b>6. Software</b></p>
        <p>Qualsiasi software, compresi i file, le immagini, i codici e i dati che accompagnano il software (complessivamente denominati "<b>Software</b>"), utilizzati o accessibili attraverso questo sito Web possono essere utilizzati esclusivamente da Lei, sempre che tali usi non siano in concorrenza o pregiudizievoli a GE Healthcare. GE Healthcare si riserva totalmente e completamente tutti i diritti di proprietà intellettuale sul Software. Si accetta di non copiare, trasferire, distribuire, vendere, modificare, decompilare, decodificare, disassemblare o creare opere derivate dal Software.</p>
        <p><b>7. Condotta utenti</b></p>
        <p>Con l’utilizzo di questo sito Web si accetta di</p>
        <p>i. non ostacolare o interferire con la sicurezza, o altrimenti abusare, del sito Web, a qualsiasi altro servizio, sistema di risorse, conto, server o rete collegati a o accessibili attraverso il sito Web;</p>
        <p>ii. non interferire con la sessione di formazione di un altro utente del sito Web;</p>
        <p>iii. non condividere informazioni sul corso di formazione e condividere le risposte con coloro che non abbiano ancora completato e superato il corso;</p>
        <p>iv. non scaricare, inviare o trasmettere attraverso questo sito Web virus o qualsiasi altro file dannoso, distruttivo o che crei disturbo.</p>
        <p><b>8. Foro competente, legge applicabile e controversie</b></p>
        <p>I presenti termini sono regolati e costituiti in conformità alle leggi in vigore in Inghilterra e Galles e le eventuali controversie, che potessero sorgere in relazione all’uso di questo sito Web, sono soggette alla competenza non esclusiva dei tribunali inglesi.</p>
        <p><b>9. Limitazione di responsabilità</b></p>
        <p>PER NESSUN MOTIVO, INCLUSO, SENZA LIMITAZIONE ALCUNA, NEGLIGENZA, GE O SUE CONTROLLANTI, CONSOCIATE, FILIALI, FUNZIONARI, DIRIGENTI, DIPENDENTI, AGENTI O FORNITORI POSSANO ESSERE RITENUTI RESPONSABILI PER QUALSIASI DANNO DIRETTO, INDIRETTO, ACCIDENTALE, SPECIALE O CONSEQUENZIALE CHE INSORGA O SIA CONNESSO ALL’USO DEL SITO O DALL’IMPOSSIBILITÀ DELL’USO DELLO STESSO, O ANCORA PER I CONTENUTI IN ESSO PRESENTI, O ANCORA RISULTANTE DA ACCESSO NON AUTORIZZATO O ALTERAZIONE DELLE PROPRIE TRASMISSIONI O DATI, O ALTRE INFORMAZIONI INVIATE O RICEVUTE O NON INVIATE O NON RICEVUTE, INCLUSO SENZA ESSERE LIMITATO A, DANNI PER PERDITE DI PROFITTI, USO, DATI O ATTIVITÀ IMMATERIALI, ANCHE NEL CASO IN CUI GE FOSSE STATA AVVISATA DELLA POSSIBILITÀ DI TALI DANNI.</p>
        <p>LE PARTI RICONOSCONO CHE QUESTA SIA UNA RAGIONEVOLE RIPARTIZIONE DEL RISCHIO. ALCUNE GIURISDIZIONI NON CONSENTONO LA LIMITAZIONE O L’ESCLUSIONE DI RESPONSABILITÀ PER DANNI ACCIDENTALI O CONSEQUENZIALI, QUINDI ALCUNE DELLE PRECEDENTI POSSONO NON APPLICARSI.</p>
        <p><b>10. Deroghe</b></p>
        <p>La mancata applicazione da parte di GE Healthcare di una qualsiasi disposizione dei presenti termini e condizioni non sarà considerata una deroga a tale disposizione né il diritto di far valere tale quest’ultima. Inoltre, qualsiasi deroga di una qualsiasi dei presenti termini da una qualsiasi delle parti sarà efficace solo se fatta per iscritto e firmata da una parte</p>
        <p><b>11. Comunicazioni e contatto</b></p>
        <p>L’indirizzo di GE Healthcare per le comunicazioni relative al presente sito Web è il seguente:</p>
        <p>
          GE Healthcare<br>
          White Lion Road,<br>
          Amersham,<br>
          Buckinghamshire,<br>
          HP7 9LL<br>
        </p>
        <p>Per qualsiasi domanda a proposito dei presenti termini, ci contatti a <a href="mailto:contactus@ge.com">contactus@ge.com</a></p>
        <p><b>12. Modifiche a queste politica di riservatezza</b></p>
        <p>Questi Termini e condizioni possono essere aggiornate da GE Healthcare periodicamente e senza preavviso per riflettere le modifiche delle nostre prassi di informazione online. Gli aggiornamenti a questa politica saranno pubblicate sul sito Web. Incoraggiamo gli utenti a verificare regolarmente questo documento per comprendere come GE healthcare protegge e usa le loro informazioni.</p>
