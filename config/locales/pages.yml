    terms-and-conditions:
      title: Términos y Condiciones
      body_html: |
        <p><b>1. Términos de uso</b></p>
        <p>La página web de formación en Vizamyl&#8482; es donde los usuarios pueden acceder al material de formación relacionado con el producto Vizamyl&#8482; de GE Healthcare (el “Producto”) y donde pueden realizar el examen para evaluar si el usuario ha comprendido cómo emplear el Producto de forma segura de conformidad con el resumen de características del producto. La página web está alojada en nombre de GE Healthcare por <a target="_blank" href="http://www.sevenstones.co.uk">www.sevenstones.co.uk</a> de Olympic House, 317-321 Latimer Road, Londres, W10 6RA. Los siguientes términos y condiciones se aplican a cualquiera que haga uso de la página web.</p>
        <p><b>2. Información que recopila GE Healthcare y cómo la usamos</b></p>
        <p><b>a. Uso de la información personal</b></p>
        <p>Para el uso óptimo de la página web y el mejor aprovechamiento de su formación, GE Healthcare deberá recopilar información sobre nombres, puestos y progresos a través del curso y si el curso se ha completado.<p>
        <p>Podremos divulgar información sobre usted si</p>
        <p>i. Nos lo exige la ley o cualquier proceso legal</p>
        <p>ii. Debemos ayudar al cumplimiento de la ley o a cualquier representante gubernamental, según sea necesario para cumplir con una solicitud legal legítima, o</p>
        <p>iii. Creemos que la divulgación es necesaria para evitar un daño físico o una pérdida financiera o que está vinculada con la investigación de una actividad supuestamente o realmente ilegal.</p>
        <p>iv. Nos reservamos el derecho de transferir cualquier información que tengamos sobre usted en caso de que vendamos o transfiramos toda o una parte de nuestros activos comerciales (incluyendo la bancarrota).</p>
        <p>No venderemos o divulgaremos en modo alguno información personal sobre los usuarios de la página web del grupo GE y sus filiales, excepto en los casos descritos en este documento y en el documento de permiso de contacto.</p>
        <p><b>b. Privacidad y almacenamiento</b></p>
        <p>Estos datos se almacenarán en un servidor con base en la República de Irlanda. Los datos solo se emplearán con fines administrativos, a no ser que haya consentido a que se utilicen de otro modo, como por ejemplo, para fines de marketing. Puede actualizar sus preferencias de contacto en cualquier momento en la sección “Mi cuenta”. Solo los empleados de GE Healthcare tendrán acceso a sus datos, a no ser que se produzca un fallo del sistema o de la página web, en cuyo caso los administradores con base en <a target="_blank" href="http://www.sevenstones.co.uk">www.sevenstones.co.uk</a> may be able to accederán a los datos con fines administrativos o de mantenimiento. Además, la plataforma de nuestro servidor, en <a target="_blank" href="http://www.heroku.com">www.heroku.com</a> albergada y gestionada por Amazon Web Services (<a target="_blank" href="http://aws.amazon.com/">http://aws.amazon.com/</a>) y, en consecuencia, los empleados de Amazon, puede que tengan acceso a los datos si hay una necesidad comercial legítima de ostentar dichos privilegios. Dichos privilegios terminarán en el momento en el que termine dicha necesidad. Si el problema es del inicio o de la ejecución de una aplicación o de software, de proporcionar soluciones a problemas conocidos o de responder preguntas generales, entonces se resolverá por los administradores con base en <a target="_blank" href="http://www.heroku.com">www.heroku.com</a>.</p>
        <p>Sus datos se almacenarán durante un periodo de tiempo razonable. Esto se hace para evaluar si el Producto debe suministrársele para uso clínico en base a si ha superado el examen sobre el uso seguro del Producto de conformidad con el resumen de las características del producto (el “Examen”). Si no ha superado el examen, deberemos hacer uso de sus datos con fines administrativos a fin de llevar a cabo una sesión de formación en persona en su país. Por este motivo, sus datos solo se emplearán con fines administrativos y de formación. Si cree que sus datos se han usado de forma inapropiada, póngase en contacto con nosotros en <a href="mailto:contactus@ge.com">contactus@ge.com</a>.</p>
        <p><b>c. Transferencia</b></p>
        <p>La información que ha suministrado a GE Healthcare será empleada en el Reino Unido, además de ser almacenada en servidores situados en la República de Irlanda. Solo el personal interno de GE Healthcare accederá a su información, a no ser que se produzca un fallo del sistema o en caso de necesidad para un proceso legal, tal y como se ha descrito anteriormente. Su información no saldrá de la Unión Europea.</p>
        <p><b>3. Protección de información personal</b></p>
        <p>En GE Healthcare, nuestro objetivo es proteger la información personal que nos ha remitido a través de nuestros sitios. Nosotros y nuestros procesadores de datos mantenemos medidas de seguridad administrativas, técnicas y físicas para protegernos frente a la divulgación, uso, alteración o destrucción no autorizada de la información personal que nos proporciona en esta y en otras páginas web de GE. También utilizamos las tecnologías razonables para mantener segura la información que nos proporciona a través del sitio.</p>
        <p><b>4. Derechos de propiedad</b></p>
        <p><b>a. Derechos de propiedad intelectual</b></p>
        <p>GE Healthcare y sus afiliados y aquellos autorizados bajo su licencia son los propietarios y conservan todos los derechos de la página web, lo que puede incluir información confidencial como la descrita en la cláusula 2a. Todo el contenido en la página web y todas las marcas comerciales y logotipos de GE Healthcare son propiedad, o están emitidos bajo licencia de GE Healthcare. Nada en estos términos y condiciones puede interpretarse como una transferencia implícita o como una licencia o derecho alguno en relación con dichos derechos a cualquier tercero, excepto cuando así se mencione expresamente.</p>
        <p>"GE Healthcare" y el logotipo de GE son marcas comerciales registradas en el Reino Unido bajo el número 2347097, en la Comunidad Europea bajo los números 003173151 y 003485745, en EE. UU. bajo los números 2961099 y 3142821 y en otros países. GE y el monograma de GE son marcas comerciales de la General Electric Company.</p>
        <p><b>b. Copyright</b></p>
        <p>Todo el contenido del sitio web, incluyendo, entre otras, texto, software, dibujos técnicos, configuraciones, gráficos, otros archivos y su selección y disposición (el "<b>Contenido</b>"), está bajo el Copyright © 2015 General Electric Company o es propiedad de GE Healthcare, de sus filiales o de aquellos autorizados bajo su licencia. Todos los derechos reservados.</p>
        <p>Puede que no pueda volver a publicar ningún contenido del sitio web, de un sitio web de Internet, de Intranet o de Extranet o incorporar la información en cualquier otra base de datos o recopilación sin permiso escrito previo. Cualquier uso distinto a los fines médicos del Contenido está estrictamente prohibido. También accede a que no extraerá, recopilará o recogerá de forma sistemática a través de medios electrónicos o de otros medios ningún dato de esta página web.</p>
        <p><b>c. Patentes</b></p>
        <p>Los productos y procesos de GE puede que estén cubiertos por una o más patentes y que estén sujetos a otros derechos de propiedad y de secreto comercial. GE Healthcare se reserva todos esos derechos. Ninguna disposición contenida en estos términos y condiciones es una transferencia u otorgamiento de derechos bajo ninguna patente o bajo ninguna otra disposición que se muestre en la página web.</p>
        <p><b>d. Marcas comerciales</b></p>
