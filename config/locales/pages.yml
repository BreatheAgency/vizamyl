    terms-and-conditions:
      title: Conditions générales
      body_html: |
        <p><b>1. Conditions d’utilisation</b></p>
        <p>Le site Internet de formation électronique Vizamyl&#0153; est l’endroit où les utilisateurs peuvent accéder au matériel de formation lié au produit Vizamyl&#0153; de GE Healthcare (le "Produit") et, éventuellement, passer un examen permettant d’évaluer si l’utilisateur a compris comment utiliser en toute sécurité le Produit, conformément au Résumé des caractéristiques du produit. Le site Internet est hébergé au nom de GE Healthcare par www.sevenstones.co.uk Olympic House, 317-321 Latimer Road, Londres, W10 6RA. Les conditions générales suivantes s’appliquent à tout utilisateur du site Internet.</p>
        <p><b>2. Informations que GE Healthcare recueille et modalités d’utilisation</b></p>
        <p><b>a. Utilisation des informations personnelles</b></p>
        <p>Pour permettre une utilisation optimale du site Internet et de votre formation, GE Healthcare devra rassembler des informations sur les noms, les postes et l’avancée dans le cours, et indiquer si le cours a été achevé.</p>
        <p>Nous sommes susceptibles de divulguer des informations vous concernant dans les situations suivantes:</p>
        <p>i. Si la loi ou un processus légal le requiert</p>
        <p>ii. Aux agents de mise en application effective de la loi ou autres agents gouvernementaux pour se conformer à une demande juridique légitime, ou</p>
        <p>iii. Lorsque nous estimons que la divulgation est nécessaire pour empêcher une atteinte à l’intégrité physique ou une perte financière, ou en relation avec une enquête sur une activité illégitime suspectée ou réelle</p>
        <p>iv. Nous nous réservons le droit de transférer toute information que nous avons vous concernant en cas de vente ou de transfert de nos actifs professionnels, en tout ou en partie, (y compris par le biais d’une faillite).</p>
        <p>Nous ne vendons pas et ne divulguons pas autrement les informations personnelles des utilisateurs du site Internet à l’extérieur du groupe GE et de ses entités affiliées, sauf comme décrit dans le présent document et dans le document de Permission de contact.</p>
        <p><b>b. Confidentialité et stockage</b></p>
        <p>Ces données seront stockées sur un serveur situé en République d’Irlande. Les données seront uniquement utilisées à des fins administratives, à moins que vous n’ayez consenti à d’autres utilisations, telles que l’utilisation de vos données à des fins commerciales. Vous pouvez à tout moment mettre à jour vos préférences en matière de contact dans la section "Mon compte". Seuls les employés de GE Healthcare ont accès aux données, sauf en cas de panne du système ou du site Internet qui nécessite que les administrateurs basés à <a target="_blank" href="http://www.sevenstones.co.uk">www.sevenstones.co.uk</a> puissent accéder aux données à des fins administratives ou de maintenance. Par ailleurs, notre plateforme de serveur à <a target="_blank" href="http://www.heroku.com">www.heroku.com</a> est hébergée et gérée par Amazon Web Services (<a target="_blank" href="http://aws.amazon.com/">http://aws.amazon.com/</a>) et, par conséquent, les employés d’Amazon sont susceptibles d’avoir accès aux données pour un besoin professionnel légitime justifiant un tel privilège. Ce privilège prend fin au moment où le besoin cesse. Si le problème réside dans le démarrage ou l’exécution d’une application ou d’un logiciel, dans l’apport de solutions à des difficultés connues ou dans la réponse à des questions à caractère général, il est alors résolu par les administrateurs basés à <a target="_blank" href="http://www.heroku.com">www.heroku.com</a>.</p>
        <p>Vos données sont stockées pendant une durée raisonnable. Ce stockage est destiné à permettre d’évaluer si le Produit devrait vous être fourni pour une utilisation clinique, sur la base de votre réussite ou de votre échec au test relatif à l’utilisation en toute sécurité du Produit, conformément au Résumé des caractéristiques du produit (l’"Examen"). Si vous avez échoué à l’Examen, nous devrons utiliser vos données à des fins administratives pour organiser une formation en face-à-face dans votre pays. Par conséquent, vos données seront uniquement utilisées à des fins administratives et pédagogiques. Si vous estimez que vos données ont été utilisées de manière inappropriée, veuillez nous contacter à <a href="mailto:contactus@ge.com">contactus@ge.com</a>.</p>
        <p><b>c. Transfert</b></p>
        <p>Les informations que vous fournissez à GE Healthcare seront utilisées au Royaume-Uni, indépendamment des informations stockées sur les serveurs situés en République d’Irlande. Seuls les membres du personnel interne de GE Healthcare auront accès à vos informations, sauf en cas de panne ou de processus juridique nécessaire, comme indiqué précédemment. Vos informations ne quitteront pas l’Union européenne.</p>
        <p><b>3. Protection des informations personnelles</b></p>
        <p>GE Healthcare a pour objectif de protéger vos informations personnelles que vous nous soumettez par le biais de nos sites. Nous gérons, ainsi que nos prestataires de services de traitement des données, des dispositifs de sécurité administratifs, techniques et physiques, aux fins d’assurer une protection contre la divulgation, l’utilisation, l’altération ou la destruction non autorisées des informations personnelles que vous fournissez sur ce site Internet et d’autres sites Internet de GE. Nous utilisons également des technologies raisonnables pour maintenir la sécurité des informations personnelles que vous nous fournissez sur le site.</p>
        <p><b>4. Droits exclusifs</b></p>
        <p><b>a. Droits de propriété intellectuelle</b></p>
        <p>GE Healthcare, ses entités affiliées et ses concédants de licence détiennent et conservent tous les droits liés au site Internet, qui peuvent inclure les informations confidentielles décrites dans la clause 2a. Tout le contenu du site Internet, toutes les marques commerciales et tous les logos de GE Healthcare sont détenus par GE Healthcare ou font l’objet d’une licence octroyée à GE Healthcare. Rien dans les présentes conditions générales ne doit être interprété comme transférant, par implication ou autrement, une licence ou un droit quelconque en relation avec lesdits droits à un tiers, à moins que cela ne soit expressément prévu.</p>
        <p>"GE Healthcare" et le logo de GE sont des marques commerciales enregistrées au Royaume-Uni sous le numéro 2347097, dans la Communauté européenne sous les numéros 003173151 et 003485745, aux États-Unis sous les numéros 2961099 et 3142821, et dans d’autres pays. GE et le monogramme GE sont des marques commerciales de General Electric Company.</p>
        <p><b>b. Droit d’auteur</b></p>
        <p>Tout le contenu du site Internet, y compris mais sans s’y limiter, la conception, le texte, le logiciel, les dessins techniques, les configurations, les graphiques et autres fichiers, et leur sélection et organisation ("<b>Contenu</b>") relèvent soit du Copyright © 2015 General Electric Company, ou sont la propriété exclusive de GE Healthcare, de ses entités affiliées ou de ses concédants de licence. Tous droits réservés.</p>
        <p>Vous ne pouvez pas republier un quelconque contenu qui figure sur ce site Internet sur un quelconque autre site Internet, Intranet ou Extranet, ou intégrer les informations dans une autre base de données ou compilation, sans en avoir préalablement obtenu la permission par écrit. Toute utilisation du contenu à d’autres fins qu’à des fins cliniques est strictement interdite. Vous acceptez également de ne pas extraire, recueillir ou récupérer systématiquement des données à partir de ce site Internet, par le biais de moyens électroniques ou autrement.</p>
        <p><b>c. Brevets</b></p>
        <p>Les produits et les processus de GE Healthcare sont susceptibles d’être couverts par un ou plusieurs brevets et font l’objet d’autres droits exclusifs et liés au secret commercial. GE Healthcare se réserve tous ces droits. Aucun transfert ou octroi de droits en vertu de brevets n’est effectué ou doit être inféré à partir d’une quelconque disposition des présentes conditions générales ou d’un quelconque élément affiché sur ce site Internet.</p>
        <p><b>d. Marques commerciales</b></p>
        <p>Toutes les marques commerciales du site Internet sont des marques commerciales ou des marques commerciales enregistrées de General Electric Company ou de GE Healthcare, de ses entités affiliées ou de ses concédants de licence et elles ne peuvent pas être copiées, imitées ou utilisées, en tout ou en partie, sans avoir préalablement obtenu la permission de GE Healthcare par écrit. Les en-têtes de page, les graphiques personnalisés, les icônes des boutons et les scripts sont des marques de service, des marques commerciales et/ou un habillage commercial de General Electric Company, de GE Healthcare ou de ses entités affiliées, et ils ne doivent pas être copiés, imités ou utilisés, en tout ou en partie, sans avoir préalablement obtenu la permission de GE Healthcare par écrit.</p>
        <p><b>5. Utilisation de cookies et de technologies similaires</b></p>
        <p>Le site Internet stocke des cookies (témoins de connexion). Pour un utilisateur connecté :  un seul cookie est uniquement stocké tant que l’utilisateur maintient le site ouvert. Il est supprimé lorsque l’utilisateur quitte la page ou ferme son navigateur. Pour surveiller l’utilisation du site : Google Analytics est utilisé pour remplir cette fonction. Google Analytics utilise principalement des cookies de première partie pour signaler les interactions des visiteurs sur le site Internet. Ces cookies sont utilisés pour stocker des informations non identifiables personnellement. Les navigateurs ne partagent pas les cookies de première partie entre les domaines. Lorsque vous utilisez notre Forum et nos services en ligne, vous acceptez que nous placions ces types de cookies et de technologies associées sur votre dispositif, à moins que vous ne les désactiviez.</p>
        <p><b>6. Logiciel</b></p>
        <p>Tout logiciel, y compris les fichiers, les images, le code et les données accompagnant le logiciel (collectivement "<b>Logiciel</b>"), utilisé ou accessible par le biais de ce site Internet, peut uniquement être utilisé par vous, dans la mesure où lesdites utilisations n’entrent pas en compétition avec GE Healthcare ou ne sont pas désobligeantes envers GE Healthcare. GE Healthcare conserve le titre et les droits de propriété intellectuelle du Logiciel dans leur intégralité. Vous acceptez de ne pas effectuer de copie, de transfert, de distribution, de vente, de modification, de décompilation, d’ingénierie inverse, de désassemblage ou de création de travaux dérivatifs à partir qu’un quelconque Logiciel.</p>
        <p><b>7 Conduite de l’utilisateur</b></p>
        <p>En utilisant ce site Internet, vous acceptez:</p>
        <p>i. de ne pas perturber la sécurité ou interférer avec la sécurité du site Internet ou des services, des ressources du système, des comptes, des serveurs ou des réseaux connectés au site Internet ou accessibles par le biais du site Internet, ou de commettre autrement des abus en la matière;</p>
        <p>ii. de ne pas interférer avec la session de formation d’un autre utilisateur ou son utilisation du site Internet;</p>
        <p>iii. de ne pas partager d’informations sur le cours de formation et de ne pas partager de réponses avec ceux qui n’ont pas encore terminé le cours et réussi le cours;</p>
        <p>iv. de ne pas télécharger, afficher, ou transmettre autrement, par le biais de ce site Internet, des virus ou d’autres fichiers nuisibles, perturbateurs ou destructeurs.</p>
        <p><b>8. Juridiction, droit applicable et avis de litige</b></p>
        <p>Les présentes conditions générales sont régies par les lois de l’Angleterre et du Pays de Galles et sont interprétées conformément auxdites lois, et vous vous soumettez à la juridiction non exclusive des tribunaux anglais en ce qui concerne tout litige qui risque d’apparaître en relation avec votre utilisation du site Internet.</p>
        <p><b>9. Limitation de responsabilité</b></p>
        <p>EN AUCUNE CIRCONSTANCE, Y COMPRIS MAIS SANS S’Y LIMITER, LA NÉGLIGENCE, GE OU SES SOCIÉTÉS MÈRES, FILIALES, ENTITÉS AFFILIÉES, RESPONSABLES, ADMINISTRATEURS, EMPLOYÉS, AGENTS OU FOURNISSEURS NE SERONT RESPONSABLES DE DOMMAGES DIRECTS, INDIRECTS, ACCESSOIRES, SPÉCIAUX OU CONSÉCUTIFS, DÉCOULANT DE L’UTILISATION OU DE L’INCAPACITÉ À UTILISER OU LIÉS À L’UTILISATION OU À L’INCAPACITÉ À UTILISER CE SITE OU UN CONTENU FIGURANT SUR LE SITE, OU RÉSULTANT DE L’ACCÈS NON AUTORISÉ OU DE L’ALTÉRATION DE VOS TRANSMISSIONS OU DONNÉES, OU D’AUTRES INFORMATIONS QUI SONT ENVOYÉES OU REÇUES OU NON ENVOYÉES OU NON REÇUES, Y COMPRIS MAIS SANS S’Y LIMITER, LES DOMMAGES DUS À UNE PERTE DE BÉNÉFICES, D’UTILISATION, DE DONNÉES OU D’AUTRES ÉLÉMENTS INTANGIBLES, MÊME SI GE A ÉTÉ AVERTI DE LA POSSIBILITÉ DE TELS DOMMAGES.</p>
        <p>LES PARTIES RECONNAISSENT QU’IL S’AGIT D’UNE ALLOCATION DE RISQUE RAISONNABLE. CERTAINES JURIDICTIONS NE PERMETTENT PAS LA LIMITATION OU L’EXCLUSION DE LA RESPONSABILITÉ POUR LES DOMMAGES ACCESSOIRES OU CONSÉCUTIFS ; IL EST DONC POSSIBLE QUE CERTAINES DES DISPOSITIONS CI-DESSUS NE S’APPLIQUENT PAS À VOUS.</p>
        <p><b>10. Renonciation</b></p>
        <p>Le fait que GE Healthcare ne mette pas en application effective une quelconque disposition des présentes conditions générales ne doit pas être considéré comme créant une renonciation de ladite disposition ou le droit de mettre en application effective ladite disposition. Par ailleurs, toute renonciation d’une disposition des présentes conditions générales de la part d’une partie sera uniquement effective si elle est formulée par écrit et signée par une partie.</p>
        <p><b>11. Avis et contact</b></p>
        <p>L’adresse de GE Healthcare pour les avis liés à ce site Internet est la suivante :</p>
        <p>
          GE Healthcare<br>
          White Lion Road,<br>
          Amersham,<br>
          Buckinghamshire,<br>
          HP7 9LL<br>
        </p>
        <p>Si vous avez des questions à propos des présentes conditions générales, veuillez nous contacter à <a href="mailto:contactus@ge.com">contactus@ge.com</a></p>
        <p><b>12. Modifications de la présente Politique de confidentialité</b></p>
        <p>GE Healthcare est susceptible de mettre périodiquement à jour les présentes conditions générales, sans vous avertir préalablement, pour refléter les modifications qui interviennent dans ses pratiques en ligne en matière d’informations. Les mises à jour de cette politique seront affichées sur le site Internet. Nous encourageons également les utilisateurs à vérifier périodiquement le présent document pour comprendre comment GE Healthcare protège et utilise vos informations.</p>
