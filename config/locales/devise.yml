en:
  devise:
    mailer:
      reset_password_instructions:
        one: Hello
        two: We have received a request to remind you of your login details for the Vizamyl electronic training programme.
        three: Please click here to reset your password.
        four_html: |
          <p>If you didn’t request this reminder, please ignore this email. Your password will not be changed until you access the link above and create a new one.</p>
          <p>Thank you,</p>
          <p>GE Healthcare</p>
    registrations:
      edit:
        title: My account
        my_details: My details
        registrations_description: You can update your contact preferences and personal details using the boxes below
        contact_preferences: Contact preferences
        salutations:
          - Prof
          - Dr
          - Mr
          - Mrs
          - Miss
          - Ms
        description_html: |
          If you pass the course, GE Healthcare would like to contact you in order to provide you with details of our products, services or further training which we believe may be of interest to you.
        marketing_overall_opt_in_description_html: |
          If you do want to receive such information, please tick the box below
        marketing_overall_opt_in_html: |
          <span class="marketing-purposes">YES, I would like to be contacted for<br>marketing purposes.<span>
        marketing_overall_opt_in_note_html: |
          (Please tick) NOTE that if you do not tick the YES option you will not receive any marketing information.
        marketing_overall_description_html: |
          If you would like to be contacted for marketing purposes, please select one of the following options so that we know your preferred method of contact:
        marketing_email_opt_in_label_html: |
          E-Mail
        marketing_post_opt_in_label_html: |
          Post
        marketing_representative_opt_in_label_html: |
          Visit from a GE Healthcare representative<br><span class="obligation">(There is no obligation to see a representative)</span>
        marketing_overall_opt_in_tick_html: |
          (Please tick one or more options)
        update: |
          Update
      new:
        salutations:
          - Prof
          - Dr
          - Mr
          - Mrs
          - Miss
          - Ms
    sessions:
      new:
        intro: |
          Please enter your email address
          and password to login.
        forgot_your_password: Forgotten your password?
        login: Login
    passwords:
      new:
        forgot_your_password: Forgotten your password?
        send: Send
      edit:
        change_your_password: Change your password
        password_label: New password
        password_confirmation_label: Confirm new password
        submit: Submit
de:
  devise:
    mailer:
      reset_password_instructions:
        one: Sehr geehrte(r)
        two: Sie haben um eine Erinnerung an die Bearbeitung Ihrer Anmeldedaten für das elektronische Schulungsprogramm zu Vizamyl gebeten.
        three: Bitte klicken Sie hier, um Ihr Passwort zurückzusetzen.
        four_html: |
          <p>Falls Sie die Erinnerung nicht angefordert haben, ignorieren Sie bitte diese Nachricht. Die Änderung Ihres Passworts erfolgt nur, wenn Sie auf den Link oben klicken und ein neues Passwort erstellen.</p>
          <p>Vielen Dank,</p>
          <p>GE Healthcare</p>
    registrations:
      edit:
        title: Mein Konto
        my_details: Meine persönlichen Daten
        registrations_description: In den Feldern unten können Sie Ihre Kontaktpräferenzen und persönlichen Daten bearbeiten
        contact_preferences: Kontaktpräferenzen
        salutations:
          - Prof
          - Dr
          - Frau
          - Herr
        description_html: |
          Falls Sie den Kurs bestehen, möchte GE Healthcare Ihnen Informationen über unsere Produkte, Dienstleistungen und weitere für Sie interessante Schulungsangebote zukommen lassen.
        marketing_overall_opt_in_description_html: |
          Bitte markieren Sie das Kästchen unten, falls Sie solche Informationen erhalten möchten.
        marketing_overall_opt_in_html: |
          <span class="marketing-purposes">JA, ich möchte zu Marketingzwecken kontaktiert werden.<span>
        marketing_overall_opt_in_note_html: |
          (Bitte markieren) Bitte beachten: Falls Sie die JA-Option nicht markieren, erhalten Sie zukünftig keine Marketing-Materialien.
        marketing_overall_description_html: |
          Wenn Sie zu Marketingzwecken kontaktiert werden möchten, wählen Sie eine der folgenden Optionen und geben Sie Ihre bevorzugte Kontaktart an:
        marketing_email_opt_in_label_html: |
          E-Mail
        marketing_post_opt_in_label_html: |
          Post
        marketing_representative_opt_in_label_html: |
          Besuch eines Vertreters von GE Healthcare<br><span class="obligation">(Es besteht keinerlei Verpflichtung zu Treffen mit GE-Vertretern)</span>
        marketing_overall_opt_in_tick_html: |
          (Bitte markieren Sie mindestens eine Option)
        update: |
          Aktualisieren
      new:
        salutations:
          - Prof
          - Dr
          - Frau
          - Herr
    sessions:
      new:
        intro: |
          Bitte geben Sie Ihre E-Mail-Adresse
          und Ihr Passwort ein, um sich anzumelden.
        forgot_your_password: Passwort vergessen?
        login: Login
    passwords:
      new:
        forgot_your_password: Passwort vergessen?
        send: Senden
      edit:
        change_your_password: Passwort ändern
        password_label: Neues Passwort
        password_confirmation_label: Neues Passwort bestätigen
        submit: Senden
