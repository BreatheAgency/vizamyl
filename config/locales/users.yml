en:
  users:
    enrol:
      details:
        title: Please enter your details.
        salutation: Salutation
      institution:
        title: Please enter your institution.
        description: Please enter the institution to which you refer patients in the box below.
      terms:
        title_html: Vizamyl&#8482; Training
        description_one_html: |
          <p>GE Healthcare will collect your data in order to assess whether you have understood how to use Vizamyl&#8482; in accordance with Vizamyl&#8482;’s Summary of Product Characteristics and whether Vizamyl&#8482; should be supplied to you for use in the event that you have passed an exam in relation to this. In the event that: (i) you pass the exam, we will use your data in order to supply Vizamyl&#8482; to you, or your institution; OR (ii) you fail the exam, we will use your data in order to provide you with face-to-face training in your country. For this purpose, we may share personal data relating to you with other companies in the GE Healthcare group. We may also hold your data for a reasonable amount of time. You can exercise your right of access and rectification and your right to object to data processing by sending a request to us at <a href="mailto:contactus@ge.com">contactus@ge.com</a>.</p>
          <p>Due to the international dimension of our group, the data may be transferred to countries outside the EU which do not grant the same level of protection to personal data.</p>
        cookies_accept_html: ""
        description_two_html: ""
        terms_accept_html: |
          <span class="terms-accept">I accept and understand the above and the Terms and Conditions</span><br><span class="please-tick">(Please tick)</span>
      marketing:
        title_html: |
          Vizamyl&#8482; Training<br>Marketing and promotional use of data
        description_html: |
          If you pass the course, GE Healthcare would like to contact you in order to provide you with details of our products, services or further training which we believe may be of interest to you.
        marketing_overall_opt_in_description_html: |
          If you do want to receive such information, please tick the box below
        marketing_overall_opt_in_html: |
          <span class="marketing-purposes">YES, I would like to be contacted for<br>marketing purposes.<span>
        marketing_overall_opt_in_note_html: |
          (Please tick) NOTE that if you do not tick the YES option you will not receive any marketing information.
        marketing_overall_description_html: |
          If you would like to be contacted for marketing purposes, please select one of the following options so that we know your preferred method of contact:
        marketing_email_opt_in_label_html: |
          E-Mail
        marketing_post_opt_in_label_html: |
          Post
        marketing_representative_opt_in_label_html: |
          Visit from a GE Healthcare representative<br><span class="obligation">(There is no obligation to see a representative)</span>
        marketing_overall_opt_in_tick_html: |
          (Please tick one or more options)
    course_completion:
      success:
        description_html: Thank you for participating in the Vizamyl electronic training programme.<br>Please download the PDF of your results and keep for your records.
        download_results: Download results
de:
  users:
    enrol:
      details:
        title: Bitte geben Sie Ihre persönlichen Daten ein.
        salutation: Anrede
      institution:
        title: Bitte geben Sie die Einrichtung an, in der Sie tätig sind.
        description: Bitte geben Sie im Feld unten die Einrichtung an, an die Sie Patienten überweisen.
      terms:
        title_html: Vizamyl&#8482; Schulung
        description_one_html: |
          <p>GE Healthcare erhebt Ihre Daten, um zu bewerten, ob Sie über ausreichende Kenntnisse zur Anwendung von Vizamyl&#8482; gemäß Fachinformation zu Vizamyl&#8482; verfügen und ob Vizamyl&#8482; an Sie geliefert werden soll, nachdem Sie eine diesbezügliche Prüfung bestanden haben. Falls Sie (i) die Prüfung bestehen, verwenden wir Ihre Daten, um Vizamyl&#8482; an Sie oder Ihre Organisation zu liefern. (ii) Falls Sie die Prüfung nicht bestehen, verwenden wir Ihre Daten, um Ihnen eine Präsenzschulung in Ihrem Land anzubieten. Zu diesem Zweck können wir Ihre persönlichen Daten an andere Unternehmen innerhalb der GE Healthcare-Gruppe weitergeben. Wir sind berechtigt, Ihre Daten während eines angemessenen Zeitraums zu speichern. Sie sind berechtigt, auf Ihre bei GE Healthcare gespeicherten Daten zuzugreifen, diese Daten zu ändern und Einwände gegen die Datenverarbeitung zu erheben. Sie können von diesem Recht Gebrauch machen, indem Sie eine entsprechende Anfrage an <a href="mailto:contactus@ge.com">contactus@ge.com</a> senden.</p>
          <p>Aufgrund der internationalen Ausrichtung von GE Healthcare kann es zur Übertragung Ihrer Daten in Länder außerhalb der EU kommen, in denen keine der EU vergleichbaren Datenschutzbestimmungen gelten.</p>
        cookies_accept_html: |
          <span class="terms-accept">Ich erkläre mich mit der Verwendung von Cookies einverstanden</span><br><span class="please-tick">(Bitte markieren)</span>
        description_two_html: |
          <p>Diese Website verwendet zur Verbesserung ihrer Funktion Cookies, die beim Verlassen der Website wieder gelöscht werden. Zur Beobachtung der Seitennutzung wird ferner Google Analytics verwendet, das mithilfe von Cookies die Besucherinteraktion auf der Website erfasst, wobei keine personenbezogenen Daten gespeichert werden.</p>
        terms_accept_html: |
          <span class="terms-accept">Ich erkläre mich mit diesen Teilnahmebedingungen einverstanden</span><br><span class="please-tick">(Bitte markieren)</span>
      marketing:
        title_html: |
          Vizamyl&#8482; Schulung<br>Nutzung von Daten für Marketing- und Promotion-Zwecke
        description_html: |
          Falls Sie den Kurs bestehen, möchte GE Healthcare Ihnen Informationen über unsere Produkte, Dienstleistungen und weitere für Sie interessante Schulungsangebote zukommen lassen.
        marketing_overall_opt_in_description_html: |
          Bitte markieren Sie das Kästchen unten, falls Sie solche Informationen erhalten möchten.
        marketing_overall_opt_in_html: |
          <span class="marketing-purposes">JA, ich möchte zu Marketingzwecken kontaktiert werden.<span>
        marketing_overall_opt_in_note_html: |
          (Bitte markieren) Bitte beachten: Falls Sie die JA-Option nicht markieren, erhalten Sie zukünftig keine Marketing-Materialien.
        marketing_overall_description_html: |
          Wenn Sie zu Marketingzwecken kontaktiert werden möchten, wählen Sie eine der folgenden Optionen und geben Sie Ihre bevorzugte Kontaktart an:
        marketing_email_opt_in_label_html: |
          E-Mail
        marketing_post_opt_in_label_html: |
          Post
        marketing_representative_opt_in_label_html: |
          Besuch eines Vertreters von GE Healthcare<br><span class="obligation">(Es besteht keinerlei Verpflichtung zu Treffen mit GE-Vertretern)</span>
        marketing_overall_opt_in_tick_html: |
          (Bitte markieren Sie mindestens eine Option)
    course_completion:
      success:
        description_html: Vielen Dank für Ihre Teilnahme am elektronischen Schulungsprogramm zu Vizamyl.<br>Bitte laden Sie die PDF-Datei mit Ihren Ergebnissen herunter und heben Sie diese für Ihre Unterlagen auf.
        download_results: Ergebnisse herunterladen
fr:
  users:
    enrol:
      details:
        title: Veuillez saisir vos données.
        salutation: Civilité
      institution:
        title: Veuillez saisir votre établissement.
        description: Veuillez saisir l’établissement auquel vous adressez vos patients dans la case ci-dessous.
      terms:
        title_html: Formation Vizamyl&#8482;
        description_one_html: |
          <p>GE Healthcare recueillera vos données pour déterminer si vous avez compris comment utiliser Vizamyl&#8482; conformément au Résumé des caractéristiques du produit Vizamyl&#8482; et si Vizamyl&#8482; devrait vous être fourni pour utilisation si vous avez réussi à l’examen en la matière. Si : (i) vous réussissez à l’examen, nous utiliserons vos données pour vous fournir Vizamyl&#8482; ou le fournir à votre établissement ; OU (ii) vous échouez à l’examen, nous utiliserons vos données pour vous fournir une formation en face-à-face dans votre pays. À ces fins, nous sommes susceptibles de partager des données personnelles vous concernant avec d’autres sociétés du groupe GE Healthcare. Nous sommes également susceptibles de conserver vos données pendant une durée raisonnable. Vous pouvez exercer votre droit d’accès et de rectification et votre droit d’objecter au traitement des données en nous envoyant une demande à <a href="mailto:contactus@ge.com">contactus@ge.com</a>.</p>
          <p>En raison de l’envergure internationale de notre groupe, les données sont susceptibles d’être transférées vers des pays à l’extérieur de l’Union européenne (UE) qui n’accordent pas le même niveau de protection des données personnelles.</p>
        cookies_accept_html: ""
        description_two_html: ""
        terms_accept_html: |
          <span class="terms-accept">J’accepte et je comprends ce qui précède et les conditions générales</span><br><span class="please-tick">(Veuillez cocher)</span>
      marketing:
        title_html: |
          Formation Vizamyl&#8482;<br><br>Commercialisation et utilisation promotionnelle des données
        description_html: |
          Si vous réussissez le cours, GE Healthcare souhaiterait vous contacter pour vous fournir des informations sur ses produits, ses services ou une formation supplémentaire susceptibles de vous intéresser.
        marketing_overall_opt_in_description_html: |
          Si vous souhaitez recevoir ces informations, veuillez cocher la case ci-dessous.
        marketing_overall_opt_in_html: |
          <span class="marketing-purposes">OUI, je souhaiterais être contacté(e)<br>à des fins commerciales.<span>
        marketing_overall_opt_in_note_html: |
          (Veuillez cocher) VEUILLEZ REMARQUER que si vous ne cochez pas l’option OUI, vous ne recevrez pas d’informations commerciales.
        marketing_overall_description_html: |
          Si vous souhaitez être contacté(e) à des fins commerciales, veuillez choisir l’une des options suivantes pour nous faire connaître votre méthode de contact préférée:
        marketing_email_opt_in_label_html: |
          Courrier électronique
        marketing_post_opt_in_label_html: |
          Courrier postal
        marketing_representative_opt_in_label_html: |
          Visite d’un représentant de GE Healthcare<br><span class="obligation">(La visite d’un représentant n’est pas obligatoire)</span>
        marketing_overall_opt_in_tick_html: |
          (Veuillez cocher une ou plusieurs options)
    course_completion:
      success:
        description_html: Nous vous remercions d’avoir participé au programme de formation électronique Vizamyl (flutémétamol (<sup>18</sup>F)).<br>Veuillez télécharger la version PDF de vos résultats et la garder pour référence.
        download_results: Télécharger les résultats
